{% extends 'karaoke/base.html' %}

{% block content %}
<div class="flex-1 bg-slate-100 flex flex-col min-h-screen">
  <!-- Admin Top Bar -->
  <div class="bg-white border-b border-slate-200/60 py-4 px-6 md:px-8 flex items-center justify-between">
    <span class="text-sm font-extrabold text-indigo-600 flex items-center gap-2">
      🛡️ Administrator Panel
    </span>
    <span class="text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full">
      Staff: {{ user.username }}
    </span>
  </div>

  <!-- Page Specific content -->
  <div class="p-6 md:p-8 flex-1 max-w-6xl w-full mx-auto">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
