{% extends 'karaoke/base.html' %}

{% block content %}
<div style="background:var(--bg-dark);flex:1;display:flex;flex-direction:column;">

  <!-- Admin Sub-bar -->
  <div style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 24px;">
    <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--accent));font-size:0.8rem;">🛡️</span>
        <span style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--primary-light);">Administrator Panel</span>
      </div>
      <span style="font-size:0.75rem;font-weight:600;color:var(--text-muted);background:var(--bg-elevated);border:1px solid var(--border);padding:4px 12px;border-radius:999px;">
        {{ user.username }}
      </span>
    </div>
  </div>

  <!-- Page Content -->
  <div style="flex:1;max-width:1200px;width:100%;margin:0 auto;padding:36px 24px 80px;">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
